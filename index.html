<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Viewer Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

</head>


<body>

  <!-- ============ UPLOAD SCREEN ============ -->
  <div id="upload-screen" class="screen active">
    <div class="upload-hero">
      <div class="logo-wrap">
        <svg class="logo-icon" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="14" fill="url(#grad)" />
          <path d="M14 34V14h14l8 8v12" stroke="#fff" stroke-width="2.5" stroke-linejoin="round" />
          <path d="M28 14v8h8" stroke="#fff" stroke-width="2.5" stroke-linejoin="round" />
          <path d="M18 24h12M18 29h8" stroke="#fff" stroke-width="2" stroke-linecap="round" />
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
              <stop stop-color="#7c3aed" />
              <stop offset="1" stop-color="#4f46e5" />
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">PDF Viewer Pro</span>
      </div>
      <h1>Visualiza tus PDFs con estilo</h1>
      <p>Modo normal o lectura · Fuente ajustable · Responsive</p>

      <div id="drop-zone" class="drop-zone">
        <input type="file" id="file-input" accept="application/pdf, .pdf"
          style="opacity:0; position:absolute; z-index:-1; width:1px; height:1px;" />
        <div class="drop-icon">
          <svg viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="32" r="30" fill="url(#dg)" opacity="0.15" />
            <path d="M32 42V22M22 32l10-10 10 10" stroke="url(#dg)" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M20 44h24" stroke="url(#dg)" stroke-width="3" stroke-linecap="round" />
            <defs>
              <linearGradient id="dg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                <stop stop-color="#a78bfa" />
                <stop offset="1" stop-color="#818cf8" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <p class="drop-title">Arrastra tu PDF aquí</p>
        <p class="drop-sub">o haz clic para seleccionar</p>
        <button class="btn-upload" onclick="document.getElementById('file-input').click()">
          Seleccionar PDF
        </button>
      </div>
    </div>
  </div>

  <!-- ============ VIEWER SCREEN ============ -->
  <div id="viewer-screen" class="screen">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="icon-btn" id="btn-back" title="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>

      <div class="file-info">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="file-icon">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        <span id="file-name-display">documento.pdf</span>
      </div>

      <div class="topbar-right">
        <!-- Mode Toggle -->
        <div class="mode-toggle">
          <button class="mode-btn active" id="btn-normal" title="Modo Normal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="9" rx="1" />
              <rect x="14" y="3" width="7" height="9" rx="1" />
              <rect x="3" y="15" width="7" height="6" rx="1" />
              <rect x="14" y="15" width="7" height="6" rx="1" />
            </svg>
            <span>Normal</span>
          </button>
          <button class="mode-btn" id="btn-read" title="Modo Lectura">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
            <span>Lectura</span>
          </button>
        </div>

        <!-- Reading Controls (visible only in read mode) -->
        <div class="reading-controls" id="reading-controls">
          <button class="ctrl-btn" id="btn-font-down" title="Reducir fuente">A-</button>
          <span class="font-size-display" id="font-size-display">16px</span>
          <button class="ctrl-btn" id="btn-font-up" title="Aumentar fuente">A+</button>

          <div class="divider-v"></div>

          <button class="ctrl-btn theme-btn" id="btn-theme-light" title="Fondo claro">☀️</button>
          <button class="ctrl-btn theme-btn" id="btn-theme-sepia" title="Fondo sepia">📜</button>
          <button class="ctrl-btn theme-btn" id="btn-theme-dark" title="Fondo oscuro">🌙</button>
        </div>
      </div>
    </header>

    <!-- Progress bar -->
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <!-- Loading -->
    <div id="loading-overlay" class="loading-overlay hidden">
      <div class="spinner"></div>
      <p>Cargando PDF…</p>
    </div>

    <!-- Normal Mode Canvas Container -->
    <div id="normal-view" class="view-container">
      <div id="canvas-container"></div>
    </div>

    <!-- Reading Mode Text Container -->
    <div id="read-view" class="view-container hidden">
      <div class="read-inner">
        <div id="read-content"></div>
      </div>
    </div>

    <!-- Shared Page Navigation -->
    <div class="page-nav hidden" id="page-nav">
      <button class="nav-btn" id="btn-prev">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <span class="page-indicator">
        <span id="current-page">1</span> / <span id="total-pages">1</span>
      </span>
      <button class="nav-btn" id="btn-next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>

  </div>

  <!-- PDF.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
